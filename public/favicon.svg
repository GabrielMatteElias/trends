<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="#064e3b" stroke-width="2"/>
  
  <!-- Lightning bolt in emerald -->
  <path d="M 50 10 L 65 40 L 50 40 L 70 80 L 45 50 L 55 50 Z" fill="url(#grad1)"/>
  
  <!-- Accent line in amber -->
  <path d="M 50 10 L 65 40" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Small accent dots -->
  <circle cx="35" cy="55" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="75" cy="65" r="2" fill="#fbbf24" opacity="0.5"/>
</svg>
